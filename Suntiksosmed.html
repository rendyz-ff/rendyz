<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Rendyz Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
    }
    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
    }
    .container {
      padding: 15px;
    }
    .card {
      background: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 16px;
      margin-bottom: 10px;
    }
    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      padding: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>🚀 Rendyz Market</header>

<div class="container">

  <!-- Followers -->
  <div class="card">
    <div class="title">Nambah Followers</div>
    <div class="price">5K / 100 Followers</div>
    <a href="https://wa.me/6282228671856?text=SAYA%20MAU%20BELI%20FOLOWERS" class="btn">
      Beli Sekarang
    </a>
  </div>

  <!-- Like -->
  <div class="card">
    <div class="title">Nambah Like</div>
    <div class="price">3K / 1000 Like</div>
    <a href="https://wa.me/6282228671856?text=SAYA%20MAU%20BELI%20SUNTIK%20LIKE" class="btn">
      Beli Sekarang
    </a>
  </div>

</div>

</body>
</html>
